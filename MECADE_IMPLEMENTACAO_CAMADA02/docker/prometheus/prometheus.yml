global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: mecade-layer2
    replica: prometheus-0

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: otel_collector
    static_configs:
      - targets: ["otel-collector:8888"]
