services:
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: mecade_l2_prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    ports:
      - "9190:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-l2-data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.3
    container_name: mecade_l2_grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=false
    ports:
      - "3100:3000"
    volumes:
      - grafana-l2-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: mecade_l2_otel
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "9188:8888"
    volumes:
      - ./docker/otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    restart: unless-stopped

  thanos-sidecar:
    image: quay.io/thanos/thanos:v0.36.1
    container_name: mecade_l2_thanos_sidecar
    command:
      - sidecar
      - --tsdb.path=/prometheus
      - --prometheus.url=http://prometheus:9090
      - --objstore.config-file=/etc/thanos/bucket.yml
      - --grpc-address=0.0.0.0:10901
      - --http-address=0.0.0.0:10902
    ports:
      - "10902:10902"
    volumes:
      - prometheus-l2-data:/prometheus
      - ./docker/thanos/bucket.yml:/etc/thanos/bucket.yml:ro
      - thanos-l2-data:/var/thanos
    depends_on:
      - prometheus
    restart: unless-stopped

  thanos-query:
    image: quay.io/thanos/thanos:v0.36.1
    container_name: mecade_l2_thanos_query
    command:
      - query
      - --http-address=0.0.0.0:10903
      - --grpc-address=0.0.0.0:10904
      - --store=thanos-sidecar:10901
    ports:
      - "10903:10903"
    depends_on:
      - thanos-sidecar
    restart: unless-stopped

  sloth:
    image: ghcr.io/slok/sloth:v0.12.0
    container_name: mecade_l2_sloth
    command: ["version"]
    volumes:
      - ./planning:/work/planning:ro
    restart: "no"

  great-expectations:
    image: python:3.11-slim
    container_name: mecade_l2_gx
    command:
      - /bin/sh
      - -c
      - pip install --no-cache-dir great_expectations==1.2.3 pyyaml==6.0.2 && sleep infinity
    volumes:
      - ./planning:/work/planning
    restart: unless-stopped

  jupyter:
    image: jupyter/scipy-notebook:python-3.11
    container_name: mecade_l2_jupyter
    environment:
      - JUPYTER_TOKEN=mecade
    ports:
      - "8898:8888"
    volumes:
      - ./planning:/home/jovyan/work/planning
      - ./python:/home/jovyan/work/python
      - ./notebooks:/home/jovyan/work/notebooks
      - ./observability:/home/jovyan/work/observability
    restart: unless-stopped

volumes:
  grafana-l2-data:
  prometheus-l2-data:
  thanos-l2-data:
