groups:
  - name: mecade-layer3
    interval: 30s
    rules:
      - record: mecade:l3:up_targets
        expr: count(up == 1)
      - alert: Layer3ObservabilityLowCoverage
        expr: mecade:l3:up_targets < 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Camada 3 sem alvos suficientes em observabilidade"
