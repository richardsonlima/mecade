services:
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: mecade_l5_prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    ports:
      - "9490:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/rules:/etc/prometheus/rules:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.3
    container_name: mecade_l5_grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=false
    ports:
      - "3400:3000"
    volumes:
      - grafana-l5-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: mecade_l5_otel
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "9488:8888"
    volumes:
      - ./docker/otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    restart: unless-stopped

  jupyter:
    image: jupyter/scipy-notebook:python-3.11
    container_name: mecade_l5_jupyter
    environment:
      - JUPYTER_TOKEN=mecade
    ports:
      - "9198:8888"
    volumes:
      - ./planning:/home/jovyan/work/planning
      - ./python:/home/jovyan/work/python
      - ./notebooks:/home/jovyan/work/notebooks
      - ./observability:/home/jovyan/work/observability
      - ./chaos:/home/jovyan/work/chaos
      - ./cicd:/home/jovyan/work/cicd
      - ./audit:/home/jovyan/work/audit
      - ./improvement:/home/jovyan/work/improvement
    restart: unless-stopped

volumes:
  grafana-l5-data:
